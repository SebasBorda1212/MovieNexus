<section class="favorites-section">
  <div class="section-header">
    <h2 class="section-title">Mis Favoritos</h2>
  </div>

  @if (favorites().length > 0) {
    <div class="movies-grid">
      @for (movie of favorites(); track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else {
    <div class="empty-state">
      <div class="empty-icon">🖤</div>
      <h3>Tu lista está vacía</h3>
      <p>Aún no has guardado ninguna película. ¡Explora el catálogo y añade tus favoritas!</p>
      <a [routerLink]="['/']" class="explore-btn">Explorar Películas</a>
    </div>
  }
</section>
