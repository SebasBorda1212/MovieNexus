<div class="movie-card" [routerLink]="['/movie', movie.id]">
  <div class="poster-wrapper">
    @if (movie.poster_path) {
      <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" [alt]="movie.title" class="poster-image">
    } @else {
      <div class="no-poster">Sin imagen</div>
    }
    <div class="card-overlay">
      <div class="rating">
        <span class="star">★</span>
        {{ movie.vote_average.toFixed(1) }}
      </div>
    </div>
  </div>
  <div class="movie-info">
    <h3 class="movie-title">{{ movie.title }}</h3>
    <p class="release-date">{{ movie.release_date | date:'yyyy' }}</p>
  </div>
</div>
